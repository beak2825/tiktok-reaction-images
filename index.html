        height: 28px;

    }

    .search {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        padding: 40px;
    }

    .card {
        background: #f5f5f5;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        transition: transform 0.2s ease;
        position: relative;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        display: block;
        cursor: pointer;
    }

    .filename {
        padding: 10px;
        font-size: 14px;
        text-align: center;
        word-break: break-word;
    }

    .download-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #1da1f2;
        border: none;
        border-radius: 6px;
        padding: 6px 8px;
        cursor: pointer;
    }

    .download-btn svg {
        fill: white;
        width: 16px;
        height: 16px;
    }

let imageData = imageFiles.map(name => ({
    name: name,
    url: baseURL + name
}));

function renderImages(data) {
    grid.innerHTML = "";
    data.forEach(img => {
        const card = document.createElement("div");
        card.className = "card";
        card.setAttribute("data-name", img.name.toLowerCase());

        const image = document.createElement("img");
        image.src = img.url;
        image.loading = "lazy";
        image.onclick = () => window.open(img.url, "_blank");

        const filename = document.createElement("div");
        filename.className = "filename";
        filename.textContent = img.name;

        const downloadBtn = document.createElement("button");
        downloadBtn.className = "download-btn";
        downloadBtn.innerHTML = `
            <svg viewBox="0 0 24 24">
                <path d="M5 20h14v-2H5m14-9h-4V3H9v6H5l7 7 7-7z"/>
            </svg>
        `;
        downloadBtn.onclick = (e) => {
            e.stopPropagation();
            const a = document.createElement("a");
            a.href = img.url;
            a.download = img.name;
            a.click();
        };

        card.appendChild(image);
        card.appendChild(downloadBtn);
        card.appendChild(filename);
        grid.appendChild(card);
    });
}

searchInput.addEventListener("input", () => {
    const term = searchInput.value.toLowerCase();
    const filtered = imageData.filter(img =>
        img.name.toLowerCase().includes(term)
    );
    renderImages(filtered);
});

renderImages(imageData);
